openapi: 3.0.0
info:
  title: REST API
  description: ShangHe user API
  version: 1.0.0
servers:
  - url: http://localhost:2580/api/
    description: Development server
  - url: http://161.248.87.252:3690/api/
    description: Deployment server

security:
  - ApiKeyAuth: []

tags:
  - name: Auth
    description: Authentication and account access endpoints
  - name: Home
    description: Home page, content, and customer service endpoints
  - name: Certificate
    description: Certificate related endpoints
  - name: Information
    description: Information content endpoints
  - name: Rank
    description: Rank and downline related endpoints
  - name: Assets
    description: Asset, allowance, earn, and inheritance endpoints
  - name: Gold
    description: Gold trading, coupon, and gold plan endpoints
  - name: Package
    description: Package purchase and package history endpoints
  - name: Meeting
    description: Meeting related endpoints
  - name: Profile
    description: KYC, payment method, and profile endpoints
  - name: Transaction
    description: Deposit, withdraw, transfer, and balance transaction endpoints
  - name: Event
    description: Event and seasonal activity endpoints

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: authorization

  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Page number
      schema:
        type: integer
        example: 1
    PerPage:
      name: perPage
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        example: 10
    UnRead:
      name: unRead
      in: query
      required: false
      description: Set to 1 to return unread notifications only
      schema:
        type: integer
        example: 1
    HistoryTab:
      name: historyTab
      in: query
      required: false
      description: 1 for unused records, 2 for used records
      schema:
        type: integer
        example: 1
    Id:
      name: id
      in: path
      required: true
      description: Record identifier
      schema:
        type: integer
        example: 1
    Type:
      name: type
      in: path
      required: true
      description: Type discriminator used by the route
      schema:
        type: string
        example: BANK
    Code:
      name: code
      in: path
      required: true
      description: Verification code used by the route
      schema:
        type: string
        example: ABC123
    MethodId:
      name: method_id
      in: path
      required: true
      description: Payment method identifier
      schema:
        type: integer
        example: 1
    ChannelId:
      name: channel_id
      in: path
      required: true
      description: Deposit channel identifier
      schema:
        type: integer
        example: 1
    OrderNo:
      name: orderNo
      in: path
      required: true
      description: Merchant order number
      schema:
        type: string
        example: ORD202605300001
    MerchantId:
      name: merchantId
      in: path
      required: true
      description: Merchant identifier
      schema:
        type: integer
        example: 1
    UserId:
      name: userId
      in: path
      required: true
      description: User identifier
      schema:
        type: integer
        example: 1

  schemas:
    Response:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        success:
          type: boolean
          example: true
        message:
          type: string
          example: SUCCESS
        data:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
        errors:
          type: object
          additionalProperties: true
          example: {}
    RegisterRequest:
      type: object
      required:
        - phone
        - password
        - invite_code
        - uuid
        - verification_code
      properties:
        phone:
          type: string
          example: "13800000000"
        password:
          type: string
          example: Pass123!
        invite_code:
          type: string
          example: INVITE001
        uuid:
          type: string
          example: 6f2f9ef7-b7f9-4b47-a6fd-91be7c04b77e
        verification_code:
          type: string
          example: 1234
    LoginRequest:
      type: object
      required:
        - phone
        - password
        - uuid
        - verification_code
      properties:
        phone:
          type: string
          example: "13800000000"
        password:
          type: string
          example: Pass123!
        uuid:
          type: string
          example: 6f2f9ef7-b7f9-4b47-a6fd-91be7c04b77e
        verification_code:
          type: string
          example: 1234
    ModifyPasswordRequest:
      type: object
      required:
        - phone
        - new_password
        - nrc_last_six_digit
      properties:
        phone:
          type: string
          example: "13800000000"
        new_password:
          type: string
          example: Better123!
        nrc_last_six_digit:
          type: string
          example: "123456"
    ForgotPasswordRequest:
      type: object
      required:
        - phone
        - nrc_number
        - new_password
        - uuid
        - verification_code
      properties:
        phone:
          type: string
          example: "13800000000"
        nrc_number:
          type: string
          example: "110101199001011234"
        new_password:
          type: string
          example: Better123!
        uuid:
          type: string
          example: 6f2f9ef7-b7f9-4b47-a6fd-91be7c04b77e
        verification_code:
          type: string
          example: 1234
    BindPaymentPasswordRequest:
      type: object
      required:
        - payment_password
        - nrc_last_six_digit
      properties:
        payment_password:
          type: string
          example: Pay123!
        nrc_last_six_digit:
          type: string
          example: "123456"
    SignUrlRequest:
      type: object
      required:
        - filename
        - content_type
      properties:
        filename:
          type: string
          example: avatar.png
        content_type:
          type: string
          example: image/png
    PostNewsRequest:
      type: object
      required:
        - type
        - content
      properties:
        type:
          type: integer
          enum: [1, 2, 3]
          example: 1
        content:
          type: string
          example: "<p>News content</p>"
    ReportNewsRequest:
      type: object
      required:
        - description
      properties:
        description:
          type: string
          example: Inaccurate content
    ImpeachChildRequest:
      type: object
      required:
        - child_id
        - impeach_type
        - reason
      properties:
        child_id:
          type: integer
          example: 10
        impeach_type:
          type: integer
          enum: [1, 2, 3]
          example: 1
        reason:
          type: string
          example: Evidence details
    InheritOwnerRequest:
      type: object
      required:
        - inherit_account
        - description
        - prove_url
      properties:
        inherit_account:
          type: string
          example: "13800000001"
        description:
          type: string
          example: Successor details
        prove_url:
          type: string
          example: /uploads/inheritance/proof.png
    GoldTradeRequest:
      type: object
      required:
        - gold_count
      properties:
        gold_count:
          type: number
          example: 1.5
    RedemptionCodeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          example: GIFT2026
    KycVerifyRequest:
      type: object
      required:
        - nrc_name
        - nrc_number
        - nrc_front_pic
        - nrc_back_pic
      properties:
        nrc_name:
          type: string
          example: Zhang San
        nrc_number:
          type: string
          example: "110101199001011234"
        nrc_front_pic:
          type: string
          example: /uploads/kyc/front.png
        nrc_back_pic:
          type: string
          example: /uploads/kyc/back.png
    BindBankRequest:
      type: object
      required:
        - bank_card_number
        - bank_card_name
        - bank_card_phone_number
        - open_bank_name
        - bank_card_pic
      properties:
        bank_card_number:
          type: string
          example: "6222000000000000"
        bank_card_name:
          type: string
          example: Zhang San
        bank_card_phone_number:
          type: string
          example: "13800000000"
        open_bank_name:
          type: string
          example: Industrial and Commercial Bank of China
        bank_card_pic:
          type: string
          example: /uploads/payment/bank-card.png
    BindAlipayRequest:
      type: object
      required:
        - ali_account_name
        - ali_account_number
        - ali_qr_code_pic
        - ali_home_page_screenshot
      properties:
        ali_account_name:
          type: string
          example: Zhang San
        ali_account_number:
          type: string
          example: 13800000000
        ali_qr_code_pic:
          type: string
          example: /uploads/payment/alipay-qr.png
        ali_home_page_screenshot:
          type: string
          example: /uploads/payment/alipay-home.png
    BindAddressRequest:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          example: Guangdong Province Shenzhen City Nanshan District Science Park 12
    DepositRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          example: 100
    WithdrawRequest:
      type: object
      required:
        - amount
        - withdrawBy
        - payment_password
      properties:
        amount:
          type: number
          example: 100
        withdrawBy:
          type: string
          enum: [BANK, ALIPAY]
          example: BANK
        payment_password:
          type: string
          example: Pay123!
    TransferRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          example: 100
    BalanceTransferRequest:
      type: object
      required:
        - receiver_phone
        - amount
        - payment_password
      properties:
        receiver_phone:
          type: string
          example: "13800000001"
        amount:
          type: number
          example: 100
        payment_password:
          type: string
          example: Pay123!
    BuyPackageRequest:
      type: object
      required:
        - payment_password
      properties:
        payment_password:
          type: string
          example: Pay123!
    UploadFileRequest:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary

paths:
  /get-recaptcha:
    get:
      tags: [Auth]
      summary: Get reCAPTCHA
      description: Returns a captcha payload for client-side verification.
      security: []
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /register:
    post:
      tags: [Auth]
      summary: Register user
      description: Create a new user account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with phone, password, and captcha data.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /profile:
    get:
      tags: [Auth]
      summary: Get profile
      description: Returns the current user profile.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidate the current session or token.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /modify-password:
    post:
      tags: [Auth]
      summary: Modify password
      description: Change the login password for the authenticated account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyPasswordRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password
      description: Reset the login password using identity data and captcha verification.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /bind-payment-password:
    post:
      tags: [Auth]
      summary: Bind payment password
      description: Set the payment password for the authenticated account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindPaymentPasswordRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /get-file-path:
    get:
      tags: [Home]
      summary: Get file path
      description: Returns file path related configuration used by the client.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /customer-service/{type}:
    get:
      tags: [Home]
      summary: Get customer service
      description: Returns customer service details for the specified type.
      security: []
      parameters:
        - $ref: '#/components/parameters/Type'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /notifications:
    get:
      tags: [Home]
      summary: List notifications
      description: Returns notifications for the authenticated user.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/UnRead'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /notifications/{id}/details:
    get:
      tags: [Home]
      summary: Get notification detail
      description: Returns notification detail by identifier.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /notifications/{id}/mark-read:
    post:
      tags: [Home]
      summary: Mark notification as read
      description: Marks the specified notification as read.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news:
    get:
      tags: [Home]
      summary: List news
      description: Returns news visible to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news/get-sign-url:
    post:
      tags: [Home]
      summary: Get news upload sign URL
      description: Returns a signed upload URL for a news attachment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUrlRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news/upload:
    post:
      tags: [Home]
      summary: Upload news media
      description: Uploads a media file for a news post.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news/post:
    post:
      tags: [Home]
      summary: Create news post
      description: Publish a news post.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostNewsRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news/{id}/details:
    get:
      tags: [Home]
      summary: Get news detail
      description: Returns a single news entry by identifier.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news/{id}/like:
    post:
      tags: [Home]
      summary: Like news
      description: Registers a like against a news entry.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /news/{id}/report:
    post:
      tags: [Home]
      summary: Report news
      description: Reports a news entry with a description.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportNewsRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /certificates:
    get:
      tags: [Certificate]
      summary: List certificates
      description: Returns available certificate records.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /my-certificates:
    get:
      tags: [Certificate]
      summary: List my certificates
      description: Returns certificate records owned by the authenticated user.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/HistoryTab'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /certificates/{id}/pick:
    post:
      tags: [Certificate]
      summary: Pick certificate
      description: Claim the specified certificate.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /certificates/{id}/use:
    post:
      tags: [Certificate]
      summary: Use certificate
      description: Use the specified certificate.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /informations:
    get:
      tags: [Information]
      summary: List information
      description: Returns information content entries.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /get-digital-aggrement:
    get:
      tags: [Home]
      summary: Get digital agreement
      description: Returns the current digital agreement content.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /sign-agreement:
    post:
      tags: [Home]
      summary: Sign agreement
      description: Signs the active digital agreement.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /get-welcome-message:
    get:
      tags: [Home]
      summary: Get welcome message
      description: Returns the authenticated user's welcome message payload.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /ranks:
    get:
      tags: [Rank]
      summary: List ranks
      description: Returns rank information available to the authenticated user.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /request-next-rank:
    post:
      tags: [Rank]
      summary: Request next rank
      description: Submit a request to move to the next rank.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /downline-child-3-level:
    get:
      tags: [Rank]
      summary: Get three-level downline
      description: Returns downline child account data up to three levels.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /impeach-child:
    post:
      tags: [Rank]
      summary: Impeach child account
      description: File an impeachment request against a child account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpeachChildRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /impeach-history:
    get:
      tags: [Rank]
      summary: Get impeachment history
      description: Returns impeachment history for the authenticated user.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /allowance-history:
    get:
      tags: [Assets]
      summary: Get allowance history
      description: Returns allowance history records.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /ticket-list:
    get:
      tags: [Assets]
      summary: Get ticket list
      description: Returns ticket list data for the authenticated user.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /allowances/{id}/exchange:
    post:
      tags: [Assets]
      summary: Exchange allowance
      description: Exchange the specified allowance record.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /exchange-history:
    get:
      tags: [Assets]
      summary: Get exchange history
      description: Returns allowance exchange history.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /inherit-owner:
    post:
      tags: [Assets]
      summary: Set inherit owner
      description: Submit inheritance owner details for the authenticated account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InheritOwnerRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /upload-inheritance-prove:
    post:
      tags: [Assets]
      summary: Upload inheritance proof
      description: Upload proof material for inheritance processing.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /earn-summary:
    get:
      tags: [Assets]
      summary: Get earn summary
      description: Returns earnings summary data.
      responses:
        '200':
          description: SUCCESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'

  /earn-history:
